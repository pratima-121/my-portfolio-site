name: Deploy pratima's portfolio site

on:
  push:
    branches:
      - main # Triggers the workflow on pushes to the main branch

jobs:
  deploy:
    runs-on: ubuntu-latest # Uses a GitHub-hosted runner with Ubuntu

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4 # Checks out the repository code

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4 # Configures AWS credentials from GitHub secrets
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-2

    - name: Sync files to S3 bucket
      run: aws s3 sync . s3://pratima-site --delete
